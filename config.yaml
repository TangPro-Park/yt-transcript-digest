youtube:
  channel_url: ""           # 예: https://www.youtube.com/@channel_handle (CLI --channel이 우선)
  date_range:
    start: ""               # 예: 2026-01-01 (CLI --start가 우선)
    end: ""                 # 예: 2026-04-30 (CLI --end가 우선)
  languages: ["ko", "en"]   # 트랜스크립트 언어 우선순위
  max_videos: 50            # 안전 상한선

output:
  base_dir: "./output/취미/위스키"

# 이미 처리된 영상 스킵은 CLI의 --all 플래그로 제어 (.processed.json 기반)

# ── 로컬 LLM 경로 (--llm local 사용 시) ─────────────────────
# OpenAI 호환 API 엔드포인트면 모두 가능 (Ollama, LM Studio, vLLM 등)
local_llm:
  base_url: "http://localhost:11434/v1"   # Ollama 기본 포트
  model: "qwen3.5:9b"                        # 사용 전 `ollama pull qwen3.5:9b`
  # model: "gemma4:e4b"                      # 대안: ollama pull gemma4:e4b (기설치)
  temperature: 0.1
  max_tokens: 4096
  num_ctx: 8192                              # Ollama 기본값 2048은 한국어 트랜스크립트를 잘라냄. 16384는 VRAM 부족 유발

# 로컬 LLM 프롬프트 치환용 화자 정보 (선택, 미지정 시 "미상"으로 폴백)
speakers:
  main_speaker: ""
  mc: ""
  other_speaker: ""
